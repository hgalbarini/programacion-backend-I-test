name: Node.js CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 1. ESTO ES CLAVE: Le dice a los comandos que trabajen dentro de la carpeta 'proyectoFinal'
    defaults:
      run:
        working-directory: ./proyectoFinal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 2. Cacheamos npm para que los tests corran más rápido en el futuro
          cache: 'npm'
          cache-dependency-path: ./proyectoFinal/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        # 3. Ejecutamos tus tests de Jest/Mocha configurados en el package.json
        run: npm test
        env:
          NODE_ENV: test
